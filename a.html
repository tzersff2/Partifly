<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compor - Partifly</title>
    <link rel="stylesheet" href="aaa.css">
</head>
<body>
    
    <header>
        <a href="home.html">Home</a>
    </header>
 
    <nav>PARTIFLY 🎵</nav>
 
    <div class="controls">
        <div class="control-group">
            <label for="bpm-input">BPM:</label>
            <input type="number" id="bpm-input" value="120" min="40" max="300" style="width: 60px; padding: 5px; border-radius: 5px; border: 1px solid #ccc;">
        </div>
 
        <div class="control-group">
            <label for="clave-selector">Clave:</label>
            <select id="clave-selector">
                <option value="imagenspap/clave_sol.png">Clave de Sol</option>
                <option value="imagenspap/clave_fa.png">Clave de Fá</option>
                <option value="imagenspap/clave_do.png">Clave de Dó</option>
            </select>
        </div>
 
        <div class="control-group">
            <label for="key-selector">Armação:</label>
            <select id="key-selector">
                <option value="">Nenhuma (Dó Maior)</option>
                <option value="♯">1 Sustenido (Sol M)</option>
                <option value="♯♯">2 Sustenidos (Ré M)</option>
                <option value="♭">1 Bemol (Fá M)</option>
                <option value="♭♭">2 Bemois (Si♭ M)</option>
            </select>
        </div>
 
        <div class="control-group">
            <label for="tempo-selector">Compasso:</label>
            <select id="tempo-selector">
                <option value="4/4">4/4</option>
                <option value="3/4">3/4</option>
                <option value="2/4">2/4</option>
                <option value="6/8">6/8</option>
            </select>
        </div>
 
        <div class="control-group">
            <label for="note-selector">Figura:</label>
            <select id="note-selector"></select>
        </div>
 
        <div class="control-group">
            <label for="accidental-selector">Acidente:</label>
            <select id="accidental-selector">
                <option value="">Nenhum</option>
                <option value="♯">♯ Sustenido</option>
                <option value="♭">♭ Bemol</option>
                <option value="♮">♮ Bequadro</option>
            </select>
        </div>
 
        <div class="control-group">
            <label>Ligadura:</label>
            <button id="ligadura-toggle" onclick="toggleLigaduraMode()" style="padding: 5px 10px; border-radius: 5px; cursor: pointer; background: #95a5a6; color: white; border: none;">Ativar</button>
        </div>
        
        <div class="control-group">
            <label>&nbsp;</label>
            <button onclick="adicionarNovaLinha()" class="btn-add">Nova Linha</button>
        </div>
 
        <div class="control-group">
            <label>&nbsp;</label>
            <button onclick="limparPartitura()" class="btn-clear">Limpar Tudo</button>
        </div>
 
        <div class="control-group">
            <label>Borracha:</label>
            <button id="eraser-btn" onclick="toggleEraser()" style="padding: 5px 15px; border-radius: 5px; cursor: pointer; background: #95a5a6; color: white; border: none;">Desativada</button>
        </div>
 
        <div class="control-group">
            <label>&nbsp;</label>
            <button id="btn-salvar-cloud" class="btn-add">💾 Salvar</button>
        </div>
 
        <div class="control-group">
            <label>&nbsp;</label>
            <button id="btn-carregar-cloud" class="btn-add">📂 Carregar</button>
        </div>
    </div>
 
    <div id="folha-musica">
        <div class="preview-container" id="staff-clickable">
            <div class="bpm-text"></div>
 
            <div class="staff-line"></div>
            <div class="staff-line"></div>
            <div class="staff-line"></div>
            <div class="staff-line"></div>
            <div class="staff-line"></div>
 
            <div class="measures-container"></div>
            <div class="notes-container"></div>
 
            <svg class="slur-container" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: visible; z-index: 99;"></svg>
            <img src="imagenspap/clave_sol.png" alt="Clave" class="clef">
            <div class="key-sig"></div>
            <div class="time-sig"></div>
            <div class="final-bar"></div>
        </div>
    </div>
 
    <script type="module" src="aaa.js"></script>
</body>
</html>
